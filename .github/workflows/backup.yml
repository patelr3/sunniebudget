name: Monthly Backup

on:
  schedule:
    - cron: '0 6 1 * *'  # 6 AM UTC on the 1st of each month
  workflow_dispatch:       # Allow manual trigger

permissions:
  id-token: write
  contents: read

env:
  FINANCE_RG: patelr3-finance-rg
  STORAGE_ACCOUNT: patelr3financedata
  AZURE_CLIENT_ID: e8de1562-63b2-4236-9c74-d8e3bf83e61d
  AZURE_TENANT_ID: 50d3fb80-db3c-406e-bc9d-a22a6b825219
  AZURE_SUBSCRIPTION_ID: 34154ec0-9335-4f09-a67a-bda54a403a14

jobs:
  backup:
    name: Backup All User Data
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Backup all user file shares
        run: |
          TIMESTAMP=$(date +%Y-%m-%d)
          STORAGE_KEY=$(az storage account keys list \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --resource-group ${{ env.FINANCE_RG }} \
            --query '[0].value' -o tsv)

          # List all user file shares
          SHARES=$(az storage share list \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --account-key "${STORAGE_KEY}" \
            --query "[?starts_with(name,'actual-user-')].name" -o tsv)

          if [ -z "$SHARES" ]; then
            echo "No user file shares found — skipping"
            exit 0
          fi

          for SHARE in $SHARES; do
            USER_ID="${SHARE#actual-user-}"
            echo "Backing up user ${USER_ID}..."

            # Snapshot the file share
            SNAPSHOT=$(az storage share snapshot \
              --name "$SHARE" \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --account-key "${STORAGE_KEY}" \
              --query 'snapshot' -o tsv 2>/dev/null) || true
            echo "  Snapshot: ${SNAPSHOT:-skipped}"

            # Download and copy to blob storage
            mkdir -p "/tmp/backup/${USER_ID}"
            az storage file download-batch \
              --source "$SHARE" \
              --destination "/tmp/backup/${USER_ID}" \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --account-key "${STORAGE_KEY}" \
              --no-progress 2>/dev/null || true

            FILE_COUNT=$(find "/tmp/backup/${USER_ID}" -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              az storage blob upload-batch \
                --source "/tmp/backup/${USER_ID}" \
                --destination backups \
                --destination-path "${TIMESTAMP}/user-${USER_ID}" \
                --account-name ${{ env.STORAGE_ACCOUNT }} \
                --account-key "${STORAGE_KEY}" \
                --overwrite --no-progress
              echo "  Backed up ${FILE_COUNT} files"
            else
              echo "  No files to back up"
            fi
          done

          rm -rf /tmp/backup
          echo "Backup complete: ${TIMESTAMP}"

      - name: Clean old backups (keep 6 months)
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --resource-group ${{ env.FINANCE_RG }} \
            --query '[0].value' -o tsv)

          CUTOFF=$(date -d '6 months ago' +%Y-%m-%d 2>/dev/null || date -v-6m +%Y-%m-%d)

          az storage blob list \
            --container-name backups \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --account-key "${STORAGE_KEY}" \
            --query "[?properties.creationTime < '${CUTOFF}'].name" -o tsv | \
          while IFS= read -r blob; do
            [ -z "$blob" ] && continue
            az storage blob delete \
              --container-name backups \
              --name "$blob" \
              --account-name ${{ env.STORAGE_ACCOUNT }} \
              --account-key "${STORAGE_KEY}" \
              --no-progress
          done
          echo "Cleanup complete"
