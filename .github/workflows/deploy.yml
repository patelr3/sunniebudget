name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FINANCE_RG: patelr3-finance-rg
  ACR_NAME: patelr3acr
  IMAGE_TAG: ${{ github.sha }}
  AZURE_CLIENT_ID: e8de1562-63b2-4236-9c74-d8e3bf83e61d
  AZURE_TENANT_ID: 50d3fb80-db3c-406e-bc9d-a22a6b825219
  AZURE_SUBSCRIPTION_ID: 34154ec0-9335-4f09-a67a-bda54a403a14

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run entrypoint tests
        run: bash tests/entrypoint.test.sh

      - name: Run Docker build tests
        run: bash tests/docker-build.test.sh

      - name: Validate Bicep
        run: az bicep build --file deployments/finance-infra.bicep --stdout > /dev/null

  build-and-deploy:
    name: Build, Push & Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Pre-deployment backup
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --account-name patelr3financedata \
            --resource-group ${{ env.FINANCE_RG }} \
            --query '[0].value' -o tsv 2>/dev/null) || true

          if [ -z "$STORAGE_KEY" ]; then
            echo "Storage account not yet created — skipping backup"
            exit 0
          fi

          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)

          # Back up all user file shares
          SHARES=$(az storage share list \
            --account-name patelr3financedata \
            --account-key "${STORAGE_KEY}" \
            --query "[?starts_with(name,'actual-user-')].name" -o tsv 2>/dev/null) || true

          for SHARE in $SHARES; do
            USER_ID="${SHARE#actual-user-}"
            mkdir -p "/tmp/backup/${USER_ID}"
            az storage file download-batch \
              --source "$SHARE" \
              --destination "/tmp/backup/${USER_ID}" \
              --account-name patelr3financedata \
              --account-key "${STORAGE_KEY}" \
              --no-progress 2>/dev/null || true

            FILE_COUNT=$(find "/tmp/backup/${USER_ID}" -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              az storage blob upload-batch \
                --source "/tmp/backup/${USER_ID}" \
                --destination backups \
                --destination-path "pre-deploy-${TIMESTAMP}/user-${USER_ID}" \
                --account-name patelr3financedata \
                --account-key "${STORAGE_KEY}" \
                --overwrite --no-progress
              echo "Backed up user ${USER_ID}: ${FILE_COUNT} files"
            fi
          done

          rm -rf /tmp/backup

      - name: Build & push images
        run: |
          ACR_SERVER="${{ env.ACR_NAME }}.azurecr.io"

          # Actual Budget server image
          docker build \
            -t "${ACR_SERVER}/actualbudget:${{ env.IMAGE_TAG }}" \
            -t "${ACR_SERVER}/actualbudget:latest" \
            .
          docker push "${ACR_SERVER}/actualbudget:${{ env.IMAGE_TAG }}"
          docker push "${ACR_SERVER}/actualbudget:latest"

          # Finance API image
          docker build \
            -t "${ACR_SERVER}/finance-api:${{ env.IMAGE_TAG }}" \
            -t "${ACR_SERVER}/finance-api:latest" \
            ./finance-api
          docker push "${ACR_SERVER}/finance-api:${{ env.IMAGE_TAG }}"
          docker push "${ACR_SERVER}/finance-api:latest"

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.FINANCE_RG }} \
            --template-file deployments/finance-infra.bicep \
            --parameters \
              financeApiTag="${{ env.IMAGE_TAG }}" \
              financeApiKey="${{ secrets.FINANCE_API_KEY }}"

      - name: Grant finance-api permissions
        run: |
          # Get finance-api managed identity principal ID
          PRINCIPAL_ID=$(az containerapp show \
            --name finance-api \
            --resource-group ${{ env.FINANCE_RG }} \
            --query 'identity.principalId' -o tsv)

          # Contributor on finance RG (for creating user ACAs, file shares, storage links)
          az role assignment create \
            --assignee-object-id "$PRINCIPAL_ID" \
            --assignee-principal-type ServicePrincipal \
            --role Contributor \
            --scope "/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.FINANCE_RG }}" \
            2>/dev/null || true

          # Contributor on ACR (for listCredentials when creating user ACAs)
          ACR_ID=$(az acr show --name ${{ env.ACR_NAME }} --resource-group patelr3-site-rg --query id -o tsv)
          az role assignment create \
            --assignee-object-id "$PRINCIPAL_ID" \
            --assignee-principal-type ServicePrincipal \
            --role Contributor \
            --scope "$ACR_ID" \
            2>/dev/null || true

      - name: Update finance-api revision
        run: |
          ACR_SERVER="${{ env.ACR_NAME }}.azurecr.io"
          az containerapp update \
            --name finance-api \
            --resource-group ${{ env.FINANCE_RG }} \
            --image "${ACR_SERVER}/finance-api:${{ env.IMAGE_TAG }}"

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name finance-api \
            --resource-group ${{ env.FINANCE_RG }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          echo "Finance API: https://${FQDN}"
