name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  entrypoint-tests:
    name: Entrypoint Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run entrypoint tests
        run: bash tests/entrypoint.test.sh

  docker-build-tests:
    name: Docker Build Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Docker build tests
        run: bash tests/docker-build.test.sh

  mcp-server-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mcp-server
        run: npm install

      - name: Run tests
        working-directory: mcp-server
        run: npm test

  bicep-validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Bicep syntax
        run: az bicep build --file deployments/finance-infra.bicep --stdout > /dev/null
